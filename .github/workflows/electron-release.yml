name: Electron Release
run-name: ${{ github.event.client_payload.tag || github.event.inputs.tag }} (${{ github.event.client_payload.channel || github.event.inputs.channel || 'production' }})

on:
  repository_dispatch:
    types: [electron-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.8)"
        required: true
      channel:
        description: "Build channel: production, dev, or test"
        required: false
        default: "production"

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.event.client_payload.tag || github.event.inputs.tag }}
  cancel-in-progress: true

env:
  TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
  CHANNEL: ${{ github.event.client_payload.channel || github.event.inputs.channel || 'production' }}
  PRIVATE_REPO: CodePhiliaX/ottermind

jobs:
  # -- Extract version --
  prepare:
    runs-on: ubuntu-latest
    name: Prepare
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${{ env.TAG }}"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

  # -- Create GitHub Release on private repo --
  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    name: Create Release
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          TITLE="Ottermind v${VERSION}"
          IS_BETA=${{ contains(needs.prepare.outputs.tag, 'beta') }}
          if [ "$IS_BETA" = "true" ]; then
            gh release create "$TAG" -R "${{ env.PRIVATE_REPO }}" --title "$TITLE" --notes "" --draft --prerelease || echo "Release already exists"
          else
            gh release create "$TAG" -R "${{ env.PRIVATE_REPO }}" --title "$TITLE" --notes "" --latest || echo "Release already exists"
          fi

  # -- macOS builds --
  build-mac:
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            bun_target: bun-darwin-arm64
            sidecar_name: ottermind-server-darwin-arm64
            platform_label: "macOS Apple Silicon"
          - arch: x64
            bun_target: bun-darwin-x64
            sidecar_name: ottermind-server-darwin-x64
            platform_label: "macOS Intel"

    runs-on: macos-latest
    name: Build ${{ matrix.platform_label }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Create desktop .env.production
        run: |
          cp apps/desktop/.env.example apps/desktop/.env.production
          CHANNEL="${{ env.CHANNEL }}"
          if [ "$CHANNEL" = "dev" ]; then
            sed -i.bak 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=dev/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Dev)/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.dev/' apps/desktop/.env.production
            sed -i.bak 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-dev|' apps/desktop/.env.production
          fi
          if [ "$CHANNEL" = "test" ]; then
            sed -i.bak 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=test/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Test)/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.test/' apps/desktop/.env.production
            sed -i.bak 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-test|' apps/desktop/.env.production
            sed -i.bak 's|VITE_APP_URL=http://localhost:8080|VITE_APP_URL=https://test.ottermind.ai|' apps/desktop/.env.production
          fi
          rm -f apps/desktop/.env.production.bak
          echo "=== .env.production ==="
          cat apps/desktop/.env.production

      - name: Update version in package.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd apps/desktop
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build agent sidecar
        working-directory: apps/agent
        env:
          OTTERMIND_WEBSITE_URL: ${{ secrets.OTTERMIND_WEBSITE_URL }}
          OTTERMIND_API_URL: ${{ secrets.OTTERMIND_API_URL }}
          OTTERMIND_BUILTIN_API_URL: ${{ secrets.OTTERMIND_BUILTIN_API_URL }}
          OTTERMIND_BUILTIN_AUTH_TOKEN: ${{ secrets.OTTERMIND_BUILTIN_AUTH_TOKEN }}
        run: |
          mkdir -p build
          bun build --compile --target=${{ matrix.bun_target }} src/index.ts --outfile build/${{ matrix.sidecar_name }}

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          NOTARIZE: "true"
          VITE_APP_CHANNEL: ${{ env.CHANNEL }}
        run: node scripts/build.mjs --mac --arch ${{ matrix.arch }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          ARCH="${{ matrix.arch }}"
          if [ -f apps/desktop/dist/latest-mac.yml ]; then
            mv apps/desktop/dist/latest-mac.yml "apps/desktop/dist/latest-mac-${ARCH}.yml"
          fi
          for f in apps/desktop/dist/*.dmg apps/desktop/dist/*.zip apps/desktop/dist/latest-mac-*.yml; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "${{ env.PRIVATE_REPO }}" --clobber
          done

  # -- Windows build --
  build-windows:
    needs: [prepare, create-release]
    runs-on: windows-latest
    name: Build Windows x64

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Create desktop .env.production
        shell: bash
        run: |
          cp apps/desktop/.env.example apps/desktop/.env.production
          CHANNEL="${{ env.CHANNEL }}"
          if [ "$CHANNEL" = "dev" ]; then
            sed -i 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=dev/' apps/desktop/.env.production
            sed -i 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Dev)/' apps/desktop/.env.production
            sed -i 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.dev/' apps/desktop/.env.production
            sed -i 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-dev|' apps/desktop/.env.production
          fi
          if [ "$CHANNEL" = "test" ]; then
            sed -i 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=test/' apps/desktop/.env.production
            sed -i 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Test)/' apps/desktop/.env.production
            sed -i 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.test/' apps/desktop/.env.production
            sed -i 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-test|' apps/desktop/.env.production
            sed -i 's|VITE_APP_URL=http://localhost:8080|VITE_APP_URL=https://test.ottermind.ai|' apps/desktop/.env.production
          fi
          echo "=== .env.production ==="
          cat apps/desktop/.env.production

      - name: Update version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd apps/desktop
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build agent sidecar
        working-directory: apps/agent
        shell: bash
        env:
          OTTERMIND_WEBSITE_URL: ${{ secrets.OTTERMIND_WEBSITE_URL }}
          OTTERMIND_API_URL: ${{ secrets.OTTERMIND_API_URL }}
          OTTERMIND_BUILTIN_API_URL: ${{ secrets.OTTERMIND_BUILTIN_API_URL }}
          OTTERMIND_BUILTIN_AUTH_TOKEN: ${{ secrets.OTTERMIND_BUILTIN_AUTH_TOKEN }}
        run: |
          mkdir -p build
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile build/ottermind-server-win32-x64.exe

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          VITE_APP_CHANNEL: ${{ env.CHANNEL }}
        run: node scripts/build.mjs --win

      - name: Upload artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for f in apps/desktop/dist/*.exe apps/desktop/dist/latest.yml; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "${{ env.PRIVATE_REPO }}" --clobber
          done

  # -- Windows code signing (self-hosted runner with USB token) --
  sign-windows:
    if: ${{ !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') }}
    needs: [prepare, build-windows]
    runs-on: self-hosted
    name: Sign Windows exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows exe from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          mkdir -p unsigned
          for i in $(seq 1 30); do
            if gh release view "$TAG" -R "$REPO" > /dev/null 2>&1; then
              echo "Release found"
              break
            fi
            echo "Waiting for release... ($i/30)"
            sleep 10
          done
          gh release download "$TAG" -R "$REPO" --dir unsigned --pattern "*.exe"

      - name: Sign exe with USB token
        shell: bash
        run: |
          EXE_PATH=$(ls unsigned/*.exe | head -1)
          echo "Signing: $EXE_PATH"
          sign.sh "$EXE_PATH"

      - name: Upload signed exe to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          for f in unsigned/*.exe; do
            [ ! -f "$f" ] && continue
            NAME=$(basename "$f")
            for attempt in 1 2 3; do
              echo "Uploading: ${NAME} (attempt ${attempt})"
              if gh release upload "$TAG" "$f" -R "$REPO" --clobber; then
                break
              fi
              echo "Upload failed, retrying in 10s..."
              sleep 10
            done
          done

      - name: Update latest.yml with signed exe hash
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          gh release download "$TAG" -R "$REPO" --dir yml-update --pattern "latest.yml" --clobber || true
          if [ ! -f yml-update/latest.yml ]; then
            echo "No latest.yml found, skipping"
            exit 0
          fi
          EXE_PATH=$(ls unsigned/*.exe | head -1)
          EXE_NAME=$(basename "$EXE_PATH")
          NEW_SHA=$(sha512sum "$EXE_PATH" | awk '{print $1}' | xxd -r -p | base64 -w0)
          NEW_SIZE=$(stat -c%s "$EXE_PATH")
          echo "Signed exe: $EXE_NAME, sha512: $NEW_SHA, size: $NEW_SIZE"
          sed -i "/${EXE_NAME}/{n;s|sha512: .*|sha512: ${NEW_SHA}|;n;s|size: .*|size: ${NEW_SIZE}|}" yml-update/latest.yml
          sed -i "/^path: ${EXE_NAME}/{ n; s|^sha512: .*|sha512: ${NEW_SHA}| }" yml-update/latest.yml
          echo "=== Updated latest.yml ==="
          cat yml-update/latest.yml
          gh release upload "$TAG" yml-update/latest.yml -R "$REPO" --clobber
          rm -rf yml-update

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf unsigned

  # -- Upload to OSS + Notify --
  upload-oss:
    if: ${{ !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') && always() && needs.build-mac.result == 'success' && (needs.sign-windows.result == 'success' || needs.sign-windows.result == 'skipped') }}
    needs: [prepare, build-mac, build-windows, sign-windows]
    runs-on: ubuntu-latest
    name: Upload to OSS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: ossutil config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          mkdir -p assets
          gh release download "$TAG" -R "$REPO" --dir assets --clobber
          echo "=== Downloaded assets ==="
          ls -la assets/

      - name: Merge mac yml files
        run: |
          ARM=assets/latest-mac-arm64.yml
          X64=assets/latest-mac-x64.yml
          OUT=assets/latest-mac.yml
          if [ ! -f "$ARM" ] || [ ! -f "$X64" ]; then
            echo "Skip merge: missing one of the mac yml files"
            exit 0
          fi
          X64_FILES=$(awk '/^files:/{flag=1; next} /^[a-z]/{flag=0} flag' "$X64")
          awk -v x64="$X64_FILES" '
            /^files:/{print; in_files=1; next}
            in_files && /^[a-z]/{print x64; in_files=0; print; next}
            {print}
            END{if(in_files) print x64}
          ' "$ARM" > "$OUT"
          echo "=== Merged latest-mac.yml ==="
          cat "$OUT"

      - name: Upload assets to OSS
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          CHANNEL="${{ env.CHANNEL }}"

          if [ "$CHANNEL" = "dev" ]; then
            OSS_BASE="oss://chat2db-cdn/ottermind/electron/dev/${TAG}"
            OSS_LATEST="oss://chat2db-cdn/ottermind/electron/dev/latest"
            CDN_BASE="https://cdn.chat2db-ai.com/ottermind/electron/dev/latest"
          elif [ "$CHANNEL" = "test" ]; then
            OSS_BASE="oss://chat2db-cdn/ottermind/electron/test/${TAG}"
            OSS_LATEST="oss://chat2db-cdn/ottermind/electron/test/latest"
            CDN_BASE="https://cdn.chat2db-ai.com/ottermind/electron/test/latest"
          else
            OSS_BASE="oss://chat2db-cdn/ottermind/electron/releases/${TAG}"
            OSS_LATEST="oss://chat2db-cdn/ottermind/electron/releases/latest"
            CDN_BASE="https://cdn.chat2db-ai.com/ottermind/electron/releases/latest"
          fi

          echo "=== Channel: ${CHANNEL}, OSS: ${OSS_BASE} ==="
          echo "=== Clearing ${OSS_LATEST}/ ==="
          ossutil rm -rf "${OSS_LATEST}/" || true

          # 收集下载链接
          DOWNLOAD_LINKS=""
          for f in assets/*; do
            [ ! -f "$f" ] && continue
            NAME=$(basename "$f")
            if [[ "$NAME" == "latest-mac-arm64.yml" || "$NAME" == "latest-mac-x64.yml" ]]; then
              continue
            fi
            echo "Uploading: $NAME"
            ossutil cp "$f" "${OSS_BASE}/${NAME}" -f
            ossutil cp "$f" "${OSS_LATEST}/${NAME}" -f --meta "Cache-Control:no-cache, must-revalidate"
            # 收集安装包链接（dmg/exe/AppImage）
            if [[ "$NAME" == *.dmg || "$NAME" == *.exe || "$NAME" == *.AppImage ]]; then
              DOWNLOAD_LINKS="${DOWNLOAD_LINKS}\n- ${NAME}: ${CDN_BASE}/${NAME}"
            fi
          done

          echo "Upload complete: ${OSS_LATEST}/"
          echo "DOWNLOAD_LINKS<<EOF" >> $GITHUB_ENV
          echo -e "$DOWNLOAD_LINKS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "CDN_BASE=${CDN_BASE}" >> $GITHUB_ENV

      - name: Refresh CDN cache
        continue-on-error: true
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          CHANNEL="${{ env.CHANNEL }}"
          if [ "$CHANNEL" = "dev" ]; then
            CDN_PATH="https://cdn.chat2db-ai.com/ottermind/electron/dev/latest/"
          elif [ "$CHANNEL" = "test" ]; then
            CDN_PATH="https://cdn.chat2db-ai.com/ottermind/electron/test/latest/"
          else
            CDN_PATH="https://cdn.chat2db-ai.com/ottermind/electron/releases/latest/"
          fi
          python3 - << PYEOF
          import json, hmac, hashlib, base64, urllib.parse, urllib.request, time, uuid, os
          key_id = os.environ["OSS_ACCESS_KEY_ID"]
          key_secret = os.environ["OSS_ACCESS_KEY_SECRET"]
          path = "${CDN_PATH}"
          params = {
              "Action": "RefreshObjectCaches",
              "ObjectPath": path,
              "ObjectType": "Directory",
              "Format": "JSON",
              "Version": "2018-05-10",
              "AccessKeyId": key_id,
              "SignatureMethod": "HMAC-SHA1",
              "SignatureVersion": "1.0",
              "SignatureNonce": str(uuid.uuid4()),
              "Timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          sorted_qs = "&".join(f"{urllib.parse.quote(k, safe='')}={urllib.parse.quote(str(v), safe='')}" for k, v in sorted(params.items()))
          string_to_sign = f"GET&%2F&{urllib.parse.quote(sorted_qs, safe='')}"
          sig = base64.b64encode(hmac.new((key_secret + "&").encode(), string_to_sign.encode(), hashlib.sha1).digest()).decode()
          params["Signature"] = sig
          url = f"https://cdn.aliyuncs.com/?{urllib.parse.urlencode(params)}"
          resp = urllib.request.urlopen(urllib.request.Request(url))
          result = json.loads(resp.read())
          print(f"CDN refresh submitted: {path}")
          print(f"RequestId: {result.get('RequestId', 'N/A')}")
          PYEOF

      - name: Notify Feishu
        if: always()
        continue-on-error: true
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "Ottermind ${{ needs.prepare.outputs.tag }} [${{ env.CHANNEL }}] ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "构建结果："
                - - tag: text
                    text: "  macOS: ${{ needs.build-mac.result == 'success' && '✅' || '❌' }}  Windows: ${{ needs.build-windows.result == 'success' && '✅' || '❌' }}  签名: ${{ needs.sign-windows.result }}"
                - - tag: text
                    text: "  OSS: ${{ job.status }}"
                - - tag: text
                    text: " "
                - - tag: text
                    text: "Actions: "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                - - tag: text
                    text: "${{ env.DOWNLOAD_LINKS }}"
