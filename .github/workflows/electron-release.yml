name: Electron Release
run-name: ${{ github.event.client_payload.tag || github.event.inputs.tag }} (${{ github.event.client_payload.channel || github.event.inputs.channel || 'production' }})

on:
  repository_dispatch:
    types: [electron-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.8)"
        required: true
      channel:
        description: "Build channel: production, dev, or test"
        required: false
        default: "production"
      skip_win_sign:
        description: "Skip Windows code signing (signer down). Ships macOS-only."
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: electron-release-${{ github.event.client_payload.tag || github.event.inputs.tag }}
  cancel-in-progress: true

env:
  TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
  CHANNEL: ${{ github.event.client_payload.channel || github.event.inputs.channel || 'production' }}
  PRIVATE_REPO: CodePhiliaX/ottermind

jobs:
  # -- Extract version --
  prepare:
    runs-on: ubuntu-latest
    name: Prepare
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
      skip_win_sign: ${{ steps.flags.outputs.SKIP_WIN_SIGN }}
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${{ env.TAG }}"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Resolve flags
        id: flags
        run: |
          # Normalize skip_win_sign across both triggers: repository_dispatch
          # sends a JSON boolean in client_payload, workflow_dispatch a string.
          # Render either to a bare string and compare in shell to avoid the
          # GHA expression boolean/string coercion gotcha downstream.
          RAW="${{ github.event.client_payload.skip_win_sign || github.event.inputs.skip_win_sign }}"
          if [ "$RAW" = "true" ]; then
            echo "SKIP_WIN_SIGN=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_WIN_SIGN=false" >> $GITHUB_OUTPUT
          fi

  # -- Create GitHub Release on private repo --
  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    name: Create Release
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          TITLE="Ottermind v${VERSION}"
          IS_BETA=${{ contains(needs.prepare.outputs.tag, 'beta') }}
          if [ "$IS_BETA" = "true" ]; then
            gh release create "$TAG" -R "${{ env.PRIVATE_REPO }}" --title "$TITLE" --notes "" --draft --prerelease || echo "Release already exists"
          else
            gh release create "$TAG" -R "${{ env.PRIVATE_REPO }}" --title "$TITLE" --notes "" --latest || echo "Release already exists"
          fi

  # -- macOS builds --
  build-mac:
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            bun_target: bun-darwin-arm64
            sidecar_name: ottermind-server-darwin-arm64
            driver_name: otter-driver-darwin-arm64
            platform_label: "macOS Apple Silicon"
          - arch: x64
            bun_target: bun-darwin-x64
            sidecar_name: ottermind-server-darwin-x64
            driver_name: otter-driver-darwin-x64
            platform_label: "macOS Intel"

    # GH 现在只剩 arm64 macOS runners (macos-latest = Apple Silicon)。x64 build 跨架构编 V8 bytecode
    # 之前导致 Intel 用户启动崩 cachedDataRejected。修：x64 job 在同 arm64 runner 上跑，
    # 但通过 Rosetta 2 把 node_modules/electron 二进制换成 x64 版本，让 electron-vite bytecode
    # plugin 跑 x64 V8 编译产物，跟最终打进 .app 的 x64 framework 匹配。见下面 "Cross-compile setup"。
    runs-on: macos-latest
    name: Build ${{ matrix.platform_label }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install desktop release dependencies
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const packageJsonPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          pkg.workspaces = [
            'apps/desktop',
            'apps/studio',
            'apps/agent',
            'apps/otterDriver',
            'packages/api',
            'packages/analytics',
            'packages/config',
            'packages/icons',
            'packages/observability',
            'packages/pricing',
            'packages/protocol',
            'packages/query',
            'packages/theme',
            'packages/types',
            'packages/ui',
            'packages/user-session',
            'packages/utils',
          ];
          pkg.dependencies = {
            ...(pkg.dependencies || {}),
            dotenv: pkg.dependencies?.dotenv || pkg.devDependencies?.dotenv || '^17.4.1',
          };
          pkg.devDependencies = pkg.devDependencies || {};
          fs.writeFileSync(packageJsonPath, JSON.stringify(pkg, null, 2) + '\n');
          NODE

          cat > bunfig.toml <<'EOF'
          [install]
          registry = "https://registry.npmjs.org"
          linker = "hoisted"
          EOF
          cat > apps/desktop/.npmrc <<'EOF'
          electron_mirror=https://npmmirror.com/mirrors/electron/
          electron_builder_binaries_mirror=https://npmmirror.com/mirrors/electron-builder-binaries/
          EOF
          rm -f bun.lock bun.lockb
          bun pm cache rm || true
          install_ok=false
          for attempt in 1 2 3; do
            echo "bun install attempt ${attempt}/3"
            if bun install --no-save --no-cache --force --registry=https://registry.npmjs.org; then
              install_ok=true
              break
            fi
            bun pm cache rm || true
            sleep $((attempt * 10))
          done
          if [ "$install_ok" != "true" ]; then
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { spawnSync } = require('child_process');

          const electronDir = ['node_modules/electron', 'apps/desktop/node_modules/electron']
            .find((candidate) => fs.existsSync(path.join(candidate, 'package.json')));
          if (!electronDir) {
            throw new Error('electron package not found after bun install');
          }

          const dist = path.join(electronDir, 'dist');
          if (!fs.existsSync(dist)) {
            console.log(`Electron dist missing at ${dist}; running install.js`);
            const result = spawnSync(process.execPath, [path.join(electronDir, 'install.js')], {
              stdio: 'inherit',
              env: process.env,
            });
            if (result.status !== 0) {
              process.exit(result.status || 1);
            }
          }

          if (!fs.existsSync(dist)) {
            throw new Error(`electron dist missing after install.js: ${dist}`);
          }
          console.log(`Electron dist ready: ${dist}`);
          NODE

          echo "Building workspace packages required by the desktop release"
          (cd packages/types && bun run build)
          (cd packages/observability && bun run build)

      # x64 mac build：bun install 默认拿到 arm64 electron（runner 是 arm64），
      # 但我们要给 mac x64 .app 编出 x64 V8 bytecode。解法：把 node_modules/electron/dist
      # 替换成 x64 版本，electron-vite bytecode plugin spawn 这个二进制时 macOS Rosetta 2
      # 自动把 x64 翻译执行 → V8 自认 x64 → 产出 x64 bytecode → 跟 mac x64 framework 匹配。
      - name: Cross-compile setup (replace electron dist with x64 for Rosetta bytecode)
        if: matrix.arch == 'x64'
        run: |
          ELECTRON_VERSION=$(node -p "require('./apps/desktop/package.json').devDependencies.electron")
          # 去掉可能的 ^ ~ 等前缀
          ELECTRON_VERSION=${ELECTRON_VERSION#^}
          ELECTRON_VERSION=${ELECTRON_VERSION#~}
          echo "Electron version: $ELECTRON_VERSION"

          DOWNLOAD_URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/electron-v${ELECTRON_VERSION}-darwin-x64.zip"
          echo "Downloading: $DOWNLOAD_URL"
          curl -fSL -o /tmp/electron-x64.zip "$DOWNLOAD_URL"

          # 找到 bun 实际 hoist 的 electron dist 位置（root 或 apps/desktop）
          ELECTRON_DIST=""
          for cand in node_modules/electron/dist apps/desktop/node_modules/electron/dist; do
            if [ -d "$cand" ]; then
              ELECTRON_DIST="$cand"
              break
            fi
          done
          if [ -z "$ELECTRON_DIST" ]; then
            echo "❌ node_modules/electron/dist not found"
            find . -path '*/node_modules/electron/dist' -maxdepth 5 -type d
            exit 1
          fi
          echo "Replacing $ELECTRON_DIST with x64 framework"

          rm -rf "$ELECTRON_DIST"
          mkdir -p "$ELECTRON_DIST"
          unzip -q /tmp/electron-x64.zip -d "$ELECTRON_DIST"

          ELECTRON_BIN="$ELECTRON_DIST/Electron.app/Contents/MacOS/Electron"
          if [ ! -f "$ELECTRON_BIN" ]; then
            echo "❌ Electron binary not found at $ELECTRON_BIN"
            ls -R "$ELECTRON_DIST" | head -30
            exit 1
          fi
          echo "✓ Replaced. Binary arch:"
          file "$ELECTRON_BIN"

          # 确保 Rosetta 2 可用（macos-latest arm64 runner 通常预装；保险起见）
          if ! /usr/bin/pgrep -q oahd; then
            echo "Installing Rosetta 2..."
            sudo /usr/sbin/softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Create desktop .env.production
        run: |
          CHANNEL="${{ env.CHANNEL }}"
          if [ "$CHANNEL" = "dev" ]; then
            sed -i.bak 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=dev/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Dev)/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.dev/' apps/desktop/.env.production
            sed -i.bak 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-dev|' apps/desktop/.env.production
            sed -i.bak 's|VITE_APP_URL=https://ottermind.ai|VITE_APP_URL=http://localhost:8080|' apps/desktop/.env.production
            sed -i.bak 's|VITE_API_URL=https://api.ottermind.ai|VITE_API_URL=http://localhost:8080|' apps/desktop/.env.production
          fi
          if [ "$CHANNEL" = "test" ]; then
            sed -i.bak 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=test/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Test)/' apps/desktop/.env.production
            sed -i.bak 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.test/' apps/desktop/.env.production
            sed -i.bak 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-test|' apps/desktop/.env.production
            sed -i.bak 's|VITE_APP_URL=https://ottermind.ai|VITE_APP_URL=https://test.ottermind.ai|' apps/desktop/.env.production
            sed -i.bak 's|VITE_API_URL=https://api.ottermind.ai|VITE_API_URL=https://test.ottermind.ai|' apps/desktop/.env.production
          fi
          rm -f apps/desktop/.env.production.bak
          echo "=== .env.production ==="
          cat apps/desktop/.env.production

      - name: Create Studio build env
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const channel = process.env.CHANNEL || 'production';
          const envFile = channel === 'test'
            ? '.env.test'
            : channel === 'dev'
              ? '.env.development'
              : '.env.production';
          const sentryDsn = 'https://4e12d9d79972ad6bbd3706c711d22d14@o4511631025569792.ingest.us.sentry.io/4511631028060160';
          const common = {
            VITE_APP_VERSION: process.env.RELEASE_VERSION || '',
            VITE_TURNSTILE_SITE_KEY: '0x4AAAAAABNRRTGo2PMTis62',
            SENTRY_DSN: sentryDsn,
            SENTRY_ERROR_SAMPLE_RATE: '1',
            SENTRY_TRACES_SAMPLE_RATE: '0',
            SENTRY_PROFILES_SAMPLE_RATE: '0',
            OTTERMIND_SENTRY_TEST_EVENT: 'false',
          };
          const perChannel = {
            production: {
              VITE_APP_CHANNEL: 'production',
              VITE_SERVER_URL: '',
              VITE_WWW_URL: '',
              VITE_DESKTOP_SCHEME: 'ottermind',
              VITE_GOOGLE_CLIENT_ID: '930457071140-8e18a1plj3sejhlavj35j3or7b5kstum.apps.googleusercontent.com',
              SENTRY_ENABLED: 'true',
            },
            test: {
              VITE_APP_CHANNEL: 'test',
              VITE_SERVER_URL: '',
              VITE_WWW_URL: '',
              VITE_DESKTOP_SCHEME: 'ottermind-test',
              VITE_GOOGLE_CLIENT_ID: '930457071140-an56f47c6dd4k06utt62u3otefsl53fm.apps.googleusercontent.com',
              SENTRY_ENABLED: 'false',
            },
            dev: {
              VITE_APP_CHANNEL: 'dev',
              VITE_SERVER_URL: '',
              VITE_WWW_URL: 'http://localhost:8080',
              VITE_DESKTOP_SCHEME: 'ottermind-dev',
              VITE_GOOGLE_CLIENT_ID: '930457071140-42e11orkrgn6cq4d4hmj3hvl8atoqbbr.apps.googleusercontent.com',
              SENTRY_ENABLED: 'false',
            },
          };
          const updates = {
            ...common,
            ...(perChannel[channel] || perChannel.production),
          };

          function upsertEnvFile(file, values) {
            const existing = fs.existsSync(file) ? fs.readFileSync(file, 'utf8') : '';
            const seen = new Set();
            const lines = existing.split(/\r?\n/);
            const nextLines = lines.map((line) => {
              const match = line.match(/^([A-Za-z_][A-Za-z0-9_]*)=/);
              if (!match || values[match[1]] === undefined) {
                return line;
              }
              seen.add(match[1]);
              return `${match[1]}=${values[match[1]]}`;
            });
            if (nextLines.length > 0 && nextLines[nextLines.length - 1] !== '') {
              nextLines.push('');
            }
            for (const [key, value] of Object.entries(values)) {
              if (!seen.has(key)) {
                nextLines.push(`${key}=${value}`);
              }
            }
            fs.writeFileSync(file, nextLines.join('\n').replace(/\n*$/, '\n'));
          }

          upsertEnvFile(envFile, updates);
          console.log(`Studio build env ready: ${envFile}`);
          for (const key of Object.keys(updates).sort()) {
            console.log(`${key}=${key === 'SENTRY_DSN' ? '[set]' : updates[key]}`);
          }
          NODE

      - name: Update version in package.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd apps/desktop
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Use GitHub Electron mirror on macOS runner
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'apps/desktop/electron-builder.yml';
          const source = 'mirror: https://npmmirror.com/mirrors/electron/';
          const target = 'mirror: https://github.com/electron/electron/releases/download/';
          const text = fs.readFileSync(path, 'utf8');
          if (!text.includes(source)) {
            throw new Error(`Expected Electron mirror not found in ${path}`);
          }
          fs.writeFileSync(path, text.replace(source, target));
          NODE
          grep -n -A1 'electronDownload' apps/desktop/electron-builder.yml

      - name: Build agent sidecar
        working-directory: apps/agent
        env:
          OTTERMIND_WEBSITE_URL: ${{ secrets.OTTERMIND_WEBSITE_URL }}
          OTTERMIND_API_URL: ${{ secrets.OTTERMIND_API_URL }}
          OTTERMIND_BUILTIN_API_URL: ${{ secrets.OTTERMIND_BUILTIN_API_URL }}
          OTTERMIND_BUILTIN_AUTH_TOKEN: ${{ secrets.OTTERMIND_BUILTIN_AUTH_TOKEN }}
        run: |
          mkdir -p build
          bun build --compile --target=${{ matrix.bun_target }} src/index.ts --outfile build/${{ matrix.sidecar_name }}

      - name: Build otterDriver sidecar
        working-directory: apps/otterDriver
        run: |
          mkdir -p ../desktop/resources/driver
          bun build --compile --target=${{ matrix.bun_target }} src/index.ts --outfile ../desktop/resources/driver/${{ matrix.driver_name }}

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          NOTARIZE: "true"
          VITE_APP_CHANNEL: ${{ env.CHANNEL }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}
          VITE_STUDIO_RENDER_MODE: local
        run: node scripts/build.mjs --mac --arch ${{ matrix.arch }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          ARCH="${{ matrix.arch }}"
          if [ -f apps/desktop/dist/latest-mac.yml ]; then
            mv apps/desktop/dist/latest-mac.yml "apps/desktop/dist/latest-mac-${ARCH}.yml"
          fi
          for f in apps/desktop/dist/*.dmg apps/desktop/dist/*.zip apps/desktop/dist/latest-mac-*.yml; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "${{ env.PRIVATE_REPO }}" --clobber
          done

  # -- Windows build --
  build-windows:
    needs: [prepare, create-release]
    runs-on: windows-latest
    name: Build Windows x64

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install desktop release dependencies
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const packageJsonPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          pkg.workspaces = [
            'apps/desktop',
            'apps/studio',
            'apps/agent',
            'apps/otterDriver',
            'packages/api',
            'packages/analytics',
            'packages/config',
            'packages/icons',
            'packages/observability',
            'packages/pricing',
            'packages/protocol',
            'packages/query',
            'packages/theme',
            'packages/types',
            'packages/ui',
            'packages/user-session',
            'packages/utils',
          ];
          pkg.dependencies = {
            ...(pkg.dependencies || {}),
            dotenv: pkg.dependencies?.dotenv || pkg.devDependencies?.dotenv || '^17.4.1',
          };
          pkg.devDependencies = pkg.devDependencies || {};
          fs.writeFileSync(packageJsonPath, JSON.stringify(pkg, null, 2) + '\n');
          NODE

          cat > bunfig.toml <<'EOF'
          [install]
          registry = "https://registry.npmjs.org"
          linker = "hoisted"
          EOF
          cat > apps/desktop/.npmrc <<'EOF'
          electron_mirror=https://npmmirror.com/mirrors/electron/
          electron_builder_binaries_mirror=https://npmmirror.com/mirrors/electron-builder-binaries/
          EOF
          rm -f bun.lock bun.lockb
          bun pm cache rm || true
          install_ok=false
          for attempt in 1 2 3; do
            echo "bun install attempt ${attempt}/3"
            if bun install --no-save --no-cache --force --registry=https://registry.npmjs.org; then
              install_ok=true
              break
            fi
            bun pm cache rm || true
            sleep $((attempt * 10))
          done
          if [ "$install_ok" != "true" ]; then
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { spawnSync } = require('child_process');

          const electronDir = ['node_modules/electron', 'apps/desktop/node_modules/electron']
            .find((candidate) => fs.existsSync(path.join(candidate, 'package.json')));
          if (!electronDir) {
            throw new Error('electron package not found after bun install');
          }

          const dist = path.join(electronDir, 'dist');
          if (!fs.existsSync(dist)) {
            console.log(`Electron dist missing at ${dist}; running install.js`);
            const result = spawnSync(process.execPath, [path.join(electronDir, 'install.js')], {
              stdio: 'inherit',
              env: process.env,
            });
            if (result.status !== 0) {
              process.exit(result.status || 1);
            }
          }

          if (!fs.existsSync(dist)) {
            throw new Error(`electron dist missing after install.js: ${dist}`);
          }
          console.log(`Electron dist ready: ${dist}`);
          NODE

          echo "Building workspace packages required by the desktop release"
          (cd packages/types && bun run build)
          (cd packages/observability && bun run build)

      - name: Create desktop .env.production
        shell: bash
        run: |
          CHANNEL="${{ env.CHANNEL }}"
          if [ "$CHANNEL" = "dev" ]; then
            sed -i 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=dev/' apps/desktop/.env.production
            sed -i 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Dev)/' apps/desktop/.env.production
            sed -i 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.dev/' apps/desktop/.env.production
            sed -i 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-dev|' apps/desktop/.env.production
            sed -i 's|VITE_APP_URL=https://ottermind.ai|VITE_APP_URL=http://localhost:8080|' apps/desktop/.env.production
            sed -i 's|VITE_API_URL=https://api.ottermind.ai|VITE_API_URL=http://localhost:8080|' apps/desktop/.env.production
          fi
          if [ "$CHANNEL" = "test" ]; then
            sed -i 's/VITE_APP_CHANNEL=production/VITE_APP_CHANNEL=test/' apps/desktop/.env.production
            sed -i 's/VITE_APP_TITLE=Ottermind/VITE_APP_TITLE=Ottermind (Test)/' apps/desktop/.env.production
            sed -i 's/VITE_APP_ID=com.ottermind.app/VITE_APP_ID=com.ottermind.test/' apps/desktop/.env.production
            sed -i 's|VITE_AGENT_DATA_DIR=~/.ottermind|VITE_AGENT_DATA_DIR=~/.ottermind-test|' apps/desktop/.env.production
            sed -i 's|VITE_APP_URL=https://ottermind.ai|VITE_APP_URL=https://test.ottermind.ai|' apps/desktop/.env.production
            sed -i 's|VITE_API_URL=https://api.ottermind.ai|VITE_API_URL=https://test.ottermind.ai|' apps/desktop/.env.production
          fi
          echo "=== .env.production ==="
          cat apps/desktop/.env.production

      - name: Create Studio build env
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const channel = process.env.CHANNEL || 'production';
          const envFile = channel === 'test'
            ? '.env.test'
            : channel === 'dev'
              ? '.env.development'
              : '.env.production';
          const sentryDsn = 'https://4e12d9d79972ad6bbd3706c711d22d14@o4511631025569792.ingest.us.sentry.io/4511631028060160';
          const common = {
            VITE_APP_VERSION: process.env.RELEASE_VERSION || '',
            VITE_TURNSTILE_SITE_KEY: '0x4AAAAAABNRRTGo2PMTis62',
            SENTRY_DSN: sentryDsn,
            SENTRY_ERROR_SAMPLE_RATE: '1',
            SENTRY_TRACES_SAMPLE_RATE: '0',
            SENTRY_PROFILES_SAMPLE_RATE: '0',
            OTTERMIND_SENTRY_TEST_EVENT: 'false',
          };
          const perChannel = {
            production: {
              VITE_APP_CHANNEL: 'production',
              VITE_SERVER_URL: '',
              VITE_WWW_URL: '',
              VITE_DESKTOP_SCHEME: 'ottermind',
              VITE_GOOGLE_CLIENT_ID: '930457071140-8e18a1plj3sejhlavj35j3or7b5kstum.apps.googleusercontent.com',
              SENTRY_ENABLED: 'true',
            },
            test: {
              VITE_APP_CHANNEL: 'test',
              VITE_SERVER_URL: '',
              VITE_WWW_URL: '',
              VITE_DESKTOP_SCHEME: 'ottermind-test',
              VITE_GOOGLE_CLIENT_ID: '930457071140-an56f47c6dd4k06utt62u3otefsl53fm.apps.googleusercontent.com',
              SENTRY_ENABLED: 'false',
            },
            dev: {
              VITE_APP_CHANNEL: 'dev',
              VITE_SERVER_URL: '',
              VITE_WWW_URL: 'http://localhost:8080',
              VITE_DESKTOP_SCHEME: 'ottermind-dev',
              VITE_GOOGLE_CLIENT_ID: '930457071140-42e11orkrgn6cq4d4hmj3hvl8atoqbbr.apps.googleusercontent.com',
              SENTRY_ENABLED: 'false',
            },
          };
          const updates = {
            ...common,
            ...(perChannel[channel] || perChannel.production),
          };

          function upsertEnvFile(file, values) {
            const existing = fs.existsSync(file) ? fs.readFileSync(file, 'utf8') : '';
            const seen = new Set();
            const lines = existing.split(/\r?\n/);
            const nextLines = lines.map((line) => {
              const match = line.match(/^([A-Za-z_][A-Za-z0-9_]*)=/);
              if (!match || values[match[1]] === undefined) {
                return line;
              }
              seen.add(match[1]);
              return `${match[1]}=${values[match[1]]}`;
            });
            if (nextLines.length > 0 && nextLines[nextLines.length - 1] !== '') {
              nextLines.push('');
            }
            for (const [key, value] of Object.entries(values)) {
              if (!seen.has(key)) {
                nextLines.push(`${key}=${value}`);
              }
            }
            fs.writeFileSync(file, nextLines.join('\n').replace(/\n*$/, '\n'));
          }

          upsertEnvFile(envFile, updates);
          console.log(`Studio build env ready: ${envFile}`);
          for (const key of Object.keys(updates).sort()) {
            console.log(`${key}=${key === 'SENTRY_DSN' ? '[set]' : updates[key]}`);
          }
          NODE

      - name: Update version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd apps/desktop
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build agent sidecar
        working-directory: apps/agent
        shell: bash
        env:
          OTTERMIND_WEBSITE_URL: ${{ secrets.OTTERMIND_WEBSITE_URL }}
          OTTERMIND_API_URL: ${{ secrets.OTTERMIND_API_URL }}
          OTTERMIND_BUILTIN_API_URL: ${{ secrets.OTTERMIND_BUILTIN_API_URL }}
          OTTERMIND_BUILTIN_AUTH_TOKEN: ${{ secrets.OTTERMIND_BUILTIN_AUTH_TOKEN }}
        run: |
          mkdir -p build
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile build/ottermind-server-win32-x64.exe

      - name: Build otterDriver sidecar
        working-directory: apps/otterDriver
        shell: bash
        run: |
          mkdir -p ../desktop/resources/driver
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile ../desktop/resources/driver/otter-driver-win32-x64.exe

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          VITE_APP_CHANNEL: ${{ env.CHANNEL }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}
          VITE_STUDIO_RENDER_MODE: local
        run: node scripts/build.mjs --win

      - name: Upload artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for f in apps/desktop/dist/*.exe apps/desktop/dist/latest.yml; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "${{ env.PRIVATE_REPO }}" --clobber
          done

      - name: Upload unsigned Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-exe-${{ needs.prepare.outputs.tag }}
          path: apps/desktop/dist/*.exe
          if-no-files-found: error
          retention-days: 3

  # Stage the unsigned Windows installer somewhere the self-hosted signer can
  # download reliably. The signer runner's GitHub path can be extremely slow,
  # while GitHub-hosted Windows -> R2 is fast and uses secrets already required
  # by the final upload job.
  stage-windows-unsigned-r2:
    if: ${{ !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') && needs.prepare.outputs.skip_win_sign != 'true' }}
    needs: [prepare, build-windows]
    runs-on: ubuntu-latest
    name: Stage unsigned Windows exe to R2

    steps:
      - name: Download unsigned Windows exe artifact
        uses: actions/download-artifact@v4
        with:
          name: unsigned-windows-exe-${{ needs.prepare.outputs.tag }}
          path: unsigned

      - name: Install AWS CLI
        shell: bash
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Upload unsigned exe to R2 staging
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID || 'ceca1f645523189fea5ec3a1cab2326e' }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT || 'https://ceca1f645523189fea5ec3a1cab2326e.r2.cloudflarestorage.com' }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || 'ottermind' }}
        run: |
          set -euo pipefail

          TAG="${{ needs.prepare.outputs.tag }}"
          R2_BUCKET="${R2_BUCKET_NAME:-ottermind}"
          R2_ENDPOINT="${R2_ENDPOINT:-https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com}"
          EXE_PATH="$(find unsigned -maxdepth 1 -type f -name '*.exe' | head -n 1)"
          if [ -z "$EXE_PATH" ]; then
            echo "::error::No unsigned exe artifact found"
            exit 1
          fi

          EXE_NAME="$(basename "$EXE_PATH")"
          KEY="electron/signing-staging/${TAG}/${EXE_NAME}"
          DEST="s3://${R2_BUCKET}/${KEY}"
          echo "Uploading unsigned exe to ${DEST}"
          aws s3 cp "$EXE_PATH" "$DEST" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/x-msdownload" \
            --cache-control "no-cache, must-revalidate"
          echo "UNSIGNED_EXE_URL=https://cdn.ottermind.ai/${KEY}" >> "$GITHUB_ENV"

      - name: Print staged unsigned exe URL
        shell: bash
        run: |
          echo "Staged unsigned exe: ${UNSIGNED_EXE_URL}"

  # -- Windows code signing (self-hosted runner with USB token) --
  sign-windows:
    # Skipped for beta tags, or when skip_win_sign is set (signer down) — in
    # which case upload-r2 sees sign result != 'success' and drops the Windows
    # assets, shipping macOS-only.
    if: ${{ always() && !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') && needs.prepare.outputs.skip_win_sign != 'true' && needs.build-windows.result == 'success' }}
    needs: [prepare, build-windows, stage-windows-unsigned-r2]
    runs-on: self-hosted
    name: Sign Windows exe
    # Windows is a required release asset. The self-hosted Mac Studio runner can
    # be slow when downloading large GitHub artifacts/release assets, so keep
    # the job budget long enough for the signer to complete instead of timing
    # out before the USB-token signing step starts.
    timeout-minutes: 180

    steps:
      - name: Cleanup signer workspace
        if: always()
        shell: bash
        run: |
          rm -rf unsigned yml-update

      - name: Download Windows exe from release
        shell: bash
        env:
          PIPELINE_GH_TOKEN: ${{ github.token }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          mkdir -p unsigned
          ARTIFACT_NAME="unsigned-windows-exe-${TAG}"
          DOWNLOAD_TIMEOUT=180s
          STAGED_BASE="https://cdn.ottermind.ai/electron/signing-staging/${TAG}"

          echo "Trying R2 staged unsigned exe first"
          if ASSET_NAME="$(timeout --kill-after=10s 30s env GH_TOKEN="$PRIVATE_REPO_TOKEN" \
            gh api "repos/${REPO}/releases/tags/${TAG}" \
              --jq '.assets[] | select(.name | endswith(".exe")) | select(.state == "uploaded") | .name' \
            | head -n 1)" && [ -n "$ASSET_NAME" ]; then
            for attempt in 1 2 3; do
              rm -f unsigned/*.exe
              STAGED_URL="${STAGED_BASE}/${ASSET_NAME}"
              echo "Downloading staged unsigned exe from R2 (attempt ${attempt}/3): ${STAGED_URL}"
              if timeout --kill-after=10s "$DOWNLOAD_TIMEOUT" curl -fL \
                --connect-timeout 20 \
                --max-time 170 \
                --retry 2 \
                --retry-delay 5 \
                -o "unsigned/${ASSET_NAME}" \
                "${STAGED_URL}"; then
                if ls unsigned/*.exe >/dev/null 2>&1; then
                  ls -lh unsigned
                  exit 0
                fi
                echo "R2 staged download succeeded but no exe was found"
              else
                rc=$?
                if [ $rc -eq 124 ]; then
                  echo "R2 staged download timed out after ${DOWNLOAD_TIMEOUT} (attempt ${attempt})"
                else
                  echo "R2 staged download failed with exit ${rc} (attempt ${attempt})"
                fi
              fi
              sleep $((attempt * 10))
            done
          else
            echo "Could not resolve release exe name for R2 staged download; falling back"
          fi

          echo "Trying GitHub Release asset first"
          for attempt in 1 2 3; do
            rm -f unsigned/*.exe
            echo "Resolving Windows exe release asset (attempt ${attempt}/3)"
            set +e
            ASSET_INFO="$(
              timeout --kill-after=10s 30s env GH_TOKEN="$PRIVATE_REPO_TOKEN" \
                gh api "repos/${REPO}/releases/tags/${TAG}" \
                  --jq '.assets[] | select(.name | endswith(".exe")) | select(.state == "uploaded") | [.id, .name, .size] | @tsv' \
                | head -n 1
            )"
            rc=$?
            set -e
            if [ $rc -ne 0 ] || [ -z "$ASSET_INFO" ]; then
              echo "Release exe asset not available yet (exit=${rc}, attempt=${attempt})"
              sleep $((attempt * 10))
              continue
            fi

            ASSET_ID="$(printf '%s' "$ASSET_INFO" | cut -f1)"
            ASSET_NAME="$(printf '%s' "$ASSET_INFO" | cut -f2)"
            ASSET_SIZE="$(printf '%s' "$ASSET_INFO" | cut -f3)"
            echo "Downloading release asset: ${ASSET_NAME} (${ASSET_SIZE} bytes), timeout=${DOWNLOAD_TIMEOUT}"
            if timeout --kill-after=10s "$DOWNLOAD_TIMEOUT" curl -fL \
              --connect-timeout 20 \
              --max-time 170 \
              --retry 2 \
              --retry-delay 5 \
              -H "Authorization: Bearer ${PRIVATE_REPO_TOKEN}" \
              -H "Accept: application/octet-stream" \
              -o "unsigned/${ASSET_NAME}" \
              "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}"; then
              if ls unsigned/*.exe >/dev/null 2>&1; then
                ls -lh unsigned
                exit 0
              fi
              echo "Release download succeeded but no exe was found"
              rc=1
            else
              rc=$?
            fi
            echo "Release download failed with exit ${rc} (attempt ${attempt}/3)"
            sleep $((attempt * 10))
          done

          echo "Release download failed; falling back to Actions artifact: ${ARTIFACT_NAME}"
          for attempt in 1 2 3; do
            rm -f unsigned/*.exe
            echo "Downloading Actions artifact (attempt ${attempt}/3, timeout=${DOWNLOAD_TIMEOUT})"
            if GH_TOKEN="$PIPELINE_GH_TOKEN" timeout "$DOWNLOAD_TIMEOUT" gh run download "${{ github.run_id }}" \
              -R "${{ github.repository }}" \
              --name "${ARTIFACT_NAME}" \
              --dir unsigned; then
              if ls unsigned/*.exe >/dev/null 2>&1; then
                ls -lh unsigned
                exit 0
              fi
              echo "Artifact download succeeded but no exe was found"
            else
              rc=$?
              if [ $rc -eq 124 ]; then
                echo "Artifact download timed out after ${DOWNLOAD_TIMEOUT} (attempt ${attempt})"
              else
                echo "Artifact download failed with exit ${rc} (attempt ${attempt})"
              fi
            fi
            sleep $((attempt * 10))
          done
          echo "::error::Failed to download Windows exe"
          exit 1

      - name: Preflight signer host
        shell: bash
        run: |
          command -v sign.sh
          command -v timeout
          : "${HOST_USER:?HOST_USER is required on the self-hosted runner}"
          : "${STOREPASS:?STOREPASS is required on the self-hosted runner}"
          WINSIGN_DIR="${WINSIGN_DIR:-/Users/chat2db/docker/github-runner/winsign}"
          echo "Checking signer host SSH and winsign files"
          ssh -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=5 \
            -o ServerAliveCountMax=2 \
            -o StrictHostKeyChecking=no \
            -i /ssh-key/id_rsa \
            "${HOST_USER}@host.docker.internal" \
            "java -version >/dev/null && test -f '${WINSIGN_DIR}/jsign-6.0.jar' && test -f '${WINSIGN_DIR}/hardwareToken.cfg'"

      - name: Sign exe with USB token
        shell: bash
        run: |
          EXE_PATH=$(find unsigned -maxdepth 1 -type f -name "*.exe" | head -1)
          if [ -z "$EXE_PATH" ]; then
            echo "::error::No unsigned exe found before signing"
            exit 1
          fi
          echo "Signing: $EXE_PATH"
          sign.sh "$EXE_PATH"

      - name: Upload signed exe to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          # Keep uploads bounded but allow the slow self-hosted runner link to finish.
          UPLOAD_TIMEOUT=45m
          for f in unsigned/*.exe; do
            [ ! -f "$f" ] && continue
            NAME=$(basename "$f")
            uploaded=0
            for attempt in 1 2 3; do
              echo "Uploading: ${NAME} (attempt ${attempt}, timeout=${UPLOAD_TIMEOUT})"
              if timeout "$UPLOAD_TIMEOUT" gh release upload "$TAG" "$f" -R "$REPO" --clobber; then
                uploaded=1
                break
              fi
              rc=$?
              if [ $rc -eq 124 ]; then
                echo "Upload timed out after ${UPLOAD_TIMEOUT} (attempt ${attempt})"
              else
                echo "Upload failed with exit ${rc} (attempt ${attempt})"
              fi
              sleep 10
            done
            if [ $uploaded -ne 1 ]; then
              echo "::error::Failed to upload ${NAME} after 3 attempts"
              exit 1
            fi
          done

      - name: Update latest.yml with signed exe hash
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          gh release download "$TAG" -R "$REPO" --dir yml-update --pattern "latest.yml" --clobber || true
          if [ ! -f yml-update/latest.yml ]; then
            echo "No latest.yml found, skipping"
            exit 0
          fi
          EXE_PATH=$(ls unsigned/*.exe | head -1)
          EXE_NAME=$(basename "$EXE_PATH")
          NEW_SHA=$(sha512sum "$EXE_PATH" | awk '{print $1}' | xxd -r -p | base64 -w0)
          NEW_SIZE=$(stat -c%s "$EXE_PATH")
          echo "Signed exe: $EXE_NAME, sha512: $NEW_SHA, size: $NEW_SIZE"
          sed -i "/${EXE_NAME}/{n;s|sha512: .*|sha512: ${NEW_SHA}|;n;s|size: .*|size: ${NEW_SIZE}|}" yml-update/latest.yml
          sed -i "/^path: ${EXE_NAME}/{ n; s|^sha512: .*|sha512: ${NEW_SHA}| }" yml-update/latest.yml
          echo "=== Updated latest.yml ==="
          cat yml-update/latest.yml
          timeout 15m gh release upload "$TAG" yml-update/latest.yml -R "$REPO" --clobber
          rm -rf yml-update

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf unsigned

  # -- Upload to Cloudflare R2 + Notify --
  upload-r2:
    # Ship macOS as long as mac builds succeed. Windows signing is optional and
    # may time out/fail; in that case skip Windows artifacts and publish macOS-only.
    if: ${{ !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') && always() && needs.build-mac.result == 'success' }}
    needs: [prepare, build-mac, build-windows, sign-windows]
    runs-on: ubuntu-latest
    name: Upload to R2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          mkdir -p assets
          gh release download "$TAG" -R "$REPO" --dir assets --clobber
          echo "=== Downloaded assets ==="
          ls -la assets/

      - name: Merge mac yml files
        run: |
          ARM=assets/latest-mac-arm64.yml
          X64=assets/latest-mac-x64.yml
          OUT=assets/latest-mac.yml
          if [ ! -f "$ARM" ] || [ ! -f "$X64" ]; then
            echo "Skip merge: missing one of the mac yml files"
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path

          arm = Path("assets/latest-mac-arm64.yml")
          x64 = Path("assets/latest-mac-x64.yml")
          out = Path("assets/latest-mac.yml")

          def file_lines(path):
              lines = path.read_text().splitlines()
              collected = []
              in_files = False
              for line in lines:
                  if line.startswith("files:"):
                      in_files = True
                      continue
                  if in_files and line[:1].isalpha():
                      break
                  if in_files and line.strip():
                      collected.append(line)
              return collected

          extra = file_lines(x64)
          merged = []
          in_files = False
          inserted = False
          for line in arm.read_text().splitlines():
              if line.startswith("files:"):
                  merged.append(line)
                  in_files = True
                  continue
              if in_files and line[:1].isalpha():
                  merged.extend(extra)
                  inserted = True
                  in_files = False
              merged.append(line)
          if in_files and not inserted:
              merged.extend(extra)
          out.write_text("\n".join(merged) + "\n")
          PY
          echo "=== Merged latest-mac.yml ==="
          cat "$OUT"

      - name: Upload assets to Cloudflare R2
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID || 'ceca1f645523189fea5ec3a1cab2326e' }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT || 'https://ceca1f645523189fea5ec3a1cab2326e.r2.cloudflarestorage.com' }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || 'ottermind' }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          CHANNEL="${{ env.CHANNEL }}"
          SIGN_RESULT="${{ needs.sign-windows.result }}"
          R2_BUCKET="${R2_BUCKET_NAME:-ottermind}"
          R2_ENDPOINT="${R2_ENDPOINT:-https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com}"
          PUBLIC_BASE="https://cdn.ottermind.ai"

          if [ "$CHANNEL" = "dev" ]; then
            R2_BASE="s3://${R2_BUCKET}/electron/dev/${TAG}"
            R2_LATEST="s3://${R2_BUCKET}/electron/dev/latest"
            DOWNLOAD_BASE="${PUBLIC_BASE}/electron/dev/latest"
          elif [ "$CHANNEL" = "test" ]; then
            R2_BASE="s3://${R2_BUCKET}/electron/test/${TAG}"
            R2_LATEST="s3://${R2_BUCKET}/electron/test/latest"
            DOWNLOAD_BASE="${PUBLIC_BASE}/electron/test/latest"
          else
            R2_BASE="s3://${R2_BUCKET}/electron/releases/${TAG}"
            R2_LATEST="s3://${R2_BUCKET}/electron/releases/latest"
            DOWNLOAD_BASE="${PUBLIC_BASE}/electron/releases/latest"
          fi

          echo "=== Channel: ${CHANNEL}, R2: ${R2_BASE} ==="
          echo "=== Clearing ${R2_LATEST}/ ==="
          aws s3 rm "${R2_LATEST}/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" || true

          # 收集下载链接
          DOWNLOAD_LINKS=""
          for f in assets/*; do
            [ ! -f "$f" ] && continue
            NAME=$(basename "$f")
            if [[ "$NAME" == "latest-mac-arm64.yml" || "$NAME" == "latest-mac-x64.yml" ]]; then
              continue
            fi
            if [[ "$SIGN_RESULT" != "success" && ( "$NAME" == *.exe || "$NAME" == "latest.yml" ) ]]; then
              echo "Skipping Windows asset because signing result is ${SIGN_RESULT}: $NAME"
              continue
            fi
            echo "Uploading: $NAME"
            CONTENT_TYPE=$(python3 -c 'import mimetypes, sys; print(mimetypes.guess_type(sys.argv[1])[0] or "application/octet-stream")' "$NAME")
            CACHE_CONTROL="public, max-age=31536000, immutable"
            if [[ "$NAME" == latest*.yml || "$NAME" == *.blockmap ]]; then
              CACHE_CONTROL="no-cache, must-revalidate"
            fi
            aws s3 cp "$f" "${R2_BASE}/${NAME}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type "${CONTENT_TYPE}" \
              --cache-control "${CACHE_CONTROL}"
            aws s3 cp "$f" "${R2_LATEST}/${NAME}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type "${CONTENT_TYPE}" \
              --cache-control "no-cache, must-revalidate"
            # 收集安装包链接（dmg/exe/AppImage）
            if [[ "$NAME" == *.dmg || "$NAME" == *.exe || "$NAME" == *.AppImage ]]; then
              DOWNLOAD_LINKS="${DOWNLOAD_LINKS}\n- ${NAME}: ${DOWNLOAD_BASE}/${NAME}"
            fi
          done

          echo "Upload complete: ${R2_LATEST}/"
          echo "DOWNLOAD_LINKS<<EOF" >> $GITHUB_ENV
          echo -e "$DOWNLOAD_LINKS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "DOWNLOAD_BASE=${DOWNLOAD_BASE}" >> $GITHUB_ENV

      - name: Prepare feishu message
        if: always()
        id: feishu
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          CHANNEL="${{ env.CHANNEL }}"
          MAC="${{ needs.build-mac.result }}"
          WIN="${{ needs.build-windows.result }}"
          SIGN="${{ needs.sign-windows.result }}"
          R2="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MAC_ICON=$( [ "$MAC" = "success" ] && echo "✅" || echo "❌" )
          WIN_ICON=$( [ "$WIN" = "success" ] && echo "✅" || echo "❌" )
          SIGN_ICON=$( [ "$SIGN" = "success" ] && echo "✅" || echo "⏭️" )
          R2_ICON=$( [ "$R2" = "success" ] && echo "✅" || echo "❌" )

          # 构建飞书 post 消息 JSON
          CONTENT="["
          CONTENT+='[{"tag":"text","text":"macOS: '"$MAC_ICON"'  Windows: '"$WIN_ICON"'  签名: '"$SIGN_ICON"'  R2: '"$R2_ICON"'"}],'
          CONTENT+='[{"tag":"text","text":" "}],'

          # 添加下载链接（每个一行）
          if [ -n "$DOWNLOAD_LINKS" ]; then
            CONTENT+='[{"tag":"text","text":"📦 下载:"}],'
            echo -e "$DOWNLOAD_LINKS" | while IFS= read -r line; do
              [ -z "$line" ] && continue
              # 格式: "- filename: url"
              FNAME=$(echo "$line" | sed 's/^- //' | cut -d: -f1)
              FURL=$(echo "$line" | sed 's/^- [^:]*: //')
              echo "LINK|${FNAME}|${FURL}"
            done > /tmp/links.txt

            while IFS='|' read -r _ fname furl; do
              CONTENT+='[{"tag":"a","text":"'"$fname"'","href":"'"$furl"'"}],'
            done < /tmp/links.txt
          fi

          CONTENT+='[{"tag":"text","text":" "}],'
          CONTENT+='[{"tag":"text","text":"Actions: "},{"tag":"a","text":"#${{ github.run_number }}","href":"'"$RUN_URL"'"}]'
          CONTENT+="]"

          echo "FEISHU_CONTENT=${CONTENT}" >> $GITHUB_ENV

      - name: Notify Feishu
        if: always()
        continue-on-error: true
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "Ottermind ${{ needs.prepare.outputs.tag }} [${{ env.CHANNEL }}] ${{ job.status == 'success' && '✅' || '❌' }}"
                content: ${{ env.FEISHU_CONTENT }}
