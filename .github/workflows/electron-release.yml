name: Electron Release
run-name: ${{ github.event.client_payload.tag || github.event.inputs.tag }}

on:
  repository_dispatch:
    types: [electron-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.8)"
        required: true

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.event.client_payload.tag || github.event.inputs.tag }}
  cancel-in-progress: true

env:
  TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
  PRIVATE_REPO: CodePhiliaX/ottermind

jobs:
  # -- Extract version --
  prepare:
    runs-on: ubuntu-latest
    name: Prepare
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${{ env.TAG }}"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

  # -- Create GitHub Release on private repo --
  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    name: Create Release
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          TITLE="Ottermind v${VERSION}"
          IS_BETA=${{ contains(needs.prepare.outputs.tag, 'beta') }}
          if [ "$IS_BETA" = "true" ]; then
            gh release create "$TAG" -R "${{ env.PRIVATE_REPO }}" --title "$TITLE" --notes "" --draft --prerelease || echo "Release already exists"
          else
            gh release create "$TAG" -R "${{ env.PRIVATE_REPO }}" --title "$TITLE" --notes "" --latest || echo "Release already exists"
          fi

  # -- macOS builds --
  build-mac:
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            bun_target: bun-darwin-arm64
            sidecar_name: ottermind-server-darwin-arm64
            platform_label: "macOS Apple Silicon"
          - arch: x64
            bun_target: bun-darwin-x64
            sidecar_name: ottermind-server-darwin-x64
            platform_label: "macOS Intel"

    runs-on: macos-latest
    name: Build ${{ matrix.platform_label }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Create desktop .env from example
        run: cp apps/desktop/.env.example apps/desktop/.env

      - name: Update version in package.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd apps/desktop
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build agent sidecar
        working-directory: apps/agent
        env:
          OTTERMIND_WEBSITE_URL: ${{ secrets.OTTERMIND_WEBSITE_URL }}
          OTTERMIND_API_URL: ${{ secrets.OTTERMIND_API_URL }}
          OTTERMIND_BUILTIN_API_URL: ${{ secrets.OTTERMIND_BUILTIN_API_URL }}
          OTTERMIND_BUILTIN_AUTH_TOKEN: ${{ secrets.OTTERMIND_BUILTIN_AUTH_TOKEN }}
        run: |
          mkdir -p build
          bun build --compile --target=${{ matrix.bun_target }} src/index.ts --outfile build/${{ matrix.sidecar_name }}

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          NOTARIZE: "true"
        run: node scripts/build.mjs --mac --arch ${{ matrix.arch }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for f in apps/desktop/dist/*.dmg apps/desktop/dist/*.zip apps/desktop/dist/latest-mac.yml; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "${{ env.PRIVATE_REPO }}" --clobber
          done

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "Ottermind v${{ needs.prepare.outputs.version }} · ${{ matrix.platform_label }} ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # -- Windows build --
  build-windows:
    needs: [prepare, create-release]
    runs-on: windows-latest
    name: Build Windows x64

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Create desktop .env from example
        shell: bash
        run: cp apps/desktop/.env.example apps/desktop/.env

      - name: Update version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd apps/desktop
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build agent sidecar
        working-directory: apps/agent
        shell: bash
        env:
          OTTERMIND_WEBSITE_URL: ${{ secrets.OTTERMIND_WEBSITE_URL }}
          OTTERMIND_API_URL: ${{ secrets.OTTERMIND_API_URL }}
          OTTERMIND_BUILTIN_API_URL: ${{ secrets.OTTERMIND_BUILTIN_API_URL }}
          OTTERMIND_BUILTIN_AUTH_TOKEN: ${{ secrets.OTTERMIND_BUILTIN_AUTH_TOKEN }}
        run: |
          mkdir -p build
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile build/ottermind-server-win32-x64.exe

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: node scripts/build.mjs --win

      - name: Upload artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for f in apps/desktop/dist/*.exe apps/desktop/dist/latest.yml; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "${{ env.PRIVATE_REPO }}" --clobber
          done

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "Ottermind v${{ needs.prepare.outputs.version }} · Windows x64 ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

  # -- Windows code signing (self-hosted runner with USB token) --
  sign-windows:
    if: ${{ !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') }}
    needs: [prepare, build-windows]
    runs-on: self-hosted
    name: Sign Windows exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows exe from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          mkdir -p unsigned
          for i in $(seq 1 30); do
            if gh release view "$TAG" -R "$REPO" > /dev/null 2>&1; then
              echo "Release found"
              break
            fi
            echo "Waiting for release... ($i/30)"
            sleep 10
          done
          gh release download "$TAG" -R "$REPO" --dir unsigned --pattern "*.exe"

      - name: Sign exe with USB token
        shell: bash
        run: |
          EXE_PATH=$(ls unsigned/*.exe | head -1)
          echo "Signing: $EXE_PATH"
          sign.sh "$EXE_PATH"

      - name: Upload signed exe to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          for f in unsigned/*.exe; do
            [ ! -f "$f" ] && continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" -R "$REPO" --clobber
          done

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "Ottermind v${{ needs.prepare.outputs.version }} · Windows Signing ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf unsigned

  # -- Upload to OSS (stable releases only) --
  upload-oss:
    if: ${{ !contains(github.event.client_payload.tag || github.event.inputs.tag, 'beta') && always() && needs.build-mac.result == 'success' && needs.sign-windows.result == 'success' }}
    needs: [prepare, build-mac, sign-windows]
    runs-on: ubuntu-latest
    name: Upload to OSS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: ossutil config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

      - name: Download release assets & upload to OSS
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="${{ env.PRIVATE_REPO }}"
          OSS_BASE="oss://chat2db-cdn/ottermind/electron/releases/${TAG}"

          mkdir -p assets
          gh release download "$TAG" -R "$REPO" --dir assets

          echo "=== Downloaded assets ==="
          ls -la assets/

          echo "=== Clearing latest/ ==="
          ossutil rm -rf "oss://chat2db-cdn/ottermind/electron/releases/latest/" || true

          for f in assets/*; do
            [ ! -f "$f" ] && continue
            NAME=$(basename "$f")
            echo "Uploading: $NAME"
            if [[ "$NAME" == *.yml ]]; then
              ossutil cp "$f" "${OSS_BASE}/${NAME}" -f --meta "Cache-Control:no-cache, must-revalidate"
              ossutil cp "$f" "oss://chat2db-cdn/ottermind/electron/releases/latest/${NAME}" -f --meta "Cache-Control:no-cache, must-revalidate"
            else
              ossutil cp "$f" "${OSS_BASE}/${NAME}" -f
              ossutil cp "$f" "oss://chat2db-cdn/ottermind/electron/releases/latest/${NAME}" -f
            fi
          done

          echo "Upload complete: https://cdn.chat2db-ai.com/ottermind/electron/releases/${TAG}/"

      - name: Notify Feishu
        if: always()
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          msg_type: post
          content: |
            post:
              zh_cn:
                title: "Ottermind ${{ needs.prepare.outputs.tag }} · OSS Upload ${{ job.status == 'success' && '✅' || '❌' }}"
                content:
                - - tag: text
                    text: "Build "
                  - tag: a
                    text: "#${{ github.run_number }}"
                    href: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  - tag: text
                    text: " ${{ job.status == 'success' && 'succeeded' || 'failed' }}"
